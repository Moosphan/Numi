<!doctype html>

<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Currency Settings</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            .material-symbols-outlined.fill {
                font-variation-settings:
                    "FILL" 1,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            /* Polyfill for missing config spacing */
            .px-margin-mobile {
                padding-left: 20px;
                padding-right: 20px;
            }
        </style>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            outline: "#707974",
                            "inverse-surface": "#2f312e",
                            tertiary: "#675780",
                            "surface-dim": "#dbdad6",
                            "tertiary-fixed-dim": "#d1beee",
                            "inverse-primary": "#94d3bd",
                            "secondary-container": "#bbebf5",
                            "on-tertiary-fixed": "#221439",
                            "ink-500": "#7D857F",
                            "on-primary": "#ffffff",
                            "error-container": "#ffdad6",
                            "primary-fixed": "#aff0d8",
                            "on-secondary-fixed-variant": "#1c4d56",
                            surface: "#faf9f5",
                            "primary-container": "#98d8c1",
                            "paper-100": "#ECEDE8",
                            background: "#faf9f5",
                            "surface-container-highest": "#e3e2df",
                            "on-tertiary-fixed-variant": "#4e4067",
                            "on-error": "#ffffff",
                            secondary: "#37656e",
                            "inverse-on-surface": "#f2f1ed",
                            "surface-variant": "#e3e2df",
                            "outline-variant": "#bfc9c3",
                            "surface-container-low": "#f4f4f0",
                            "on-secondary": "#ffffff",
                            "secondary-fixed-dim": "#9fced8",
                            "surface-container-lowest": "#ffffff",
                            "on-surface-variant": "#404945",
                            "expense-blue": "#4D7B84",
                            "tertiary-fixed": "#ecdcff",
                            "primary-fixed-dim": "#94d3bd",
                            "on-secondary-container": "#3d6b74",
                            "on-background": "#1b1c1a",
                            "ink-900": "#1E211F",
                            "paper-050": "#F4F4EF",
                            "surface-container": "#efeeea",
                            "income-violet": "#71618B",
                            "on-tertiary-container": "#5e4e77",
                            "on-error-container": "#93000a",
                            "surface-container-high": "#e9e8e4",
                            primary: "#296956",
                            "secondary-fixed": "#bbebf5",
                            "ink-700": "#4D544F",
                            "on-primary-fixed-variant": "#07513f",
                            "on-tertiary": "#ffffff",
                            "on-primary-fixed": "#002118",
                            error: "#ba1a1a",
                            "on-secondary-fixed": "#001f24",
                            "negative-rose": "#9A514A",
                            "tertiary-container": "#d6c3f3",
                            "on-primary-container": "#1e604e",
                            "surface-tint": "#296956",
                            "on-surface": "#1b1c1a",
                            "surface-bright": "#faf9f5",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        spacing: {
                            block: "32px",
                            micro: "4px",
                            section: "24px",
                            standard: "16px",
                            compact: "8px",
                            gutter: "20px",
                        },
                        fontFamily: {
                            "title-lg": ["Hanken Grotesk"],
                            "body-strong": ["Hanken Grotesk"],
                            "body-small": ["Hanken Grotesk"],
                            "body-default": ["Hanken Grotesk"],
                            "amount-xl": ["Hanken Grotesk"],
                            caption: ["Hanken Grotesk"],
                            footnote: ["Hanken Grotesk"],
                            "amount-lg": ["Hanken Grotesk"],
                        },
                        fontSize: {
                            "title-lg": [
                                "22px",
                                { lineHeight: "28px", fontWeight: "600" },
                            ],
                            "body-strong": [
                                "17px",
                                { lineHeight: "23px", fontWeight: "600" },
                            ],
                            "body-small": [
                                "14px",
                                { lineHeight: "19px", fontWeight: "400" },
                            ],
                            "body-default": [
                                "16px",
                                { lineHeight: "22px", fontWeight: "400" },
                            ],
                            "amount-xl": [
                                "34px",
                                {
                                    lineHeight: "40px",
                                    letterSpacing: "-0.02em",
                                    fontWeight: "800",
                                },
                            ],
                            caption: [
                                "11px",
                                { lineHeight: "14px", fontWeight: "500" },
                            ],
                            footnote: [
                                "12px",
                                { lineHeight: "16px", fontWeight: "500" },
                            ],
                            "amount-lg": [
                                "28px",
                                {
                                    lineHeight: "34px",
                                    letterSpacing: "-0.01em",
                                    fontWeight: "700",
                                },
                            ],
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                min-height: max(884px, 100dvh);
            }
        </style>
    </head>
    <body
        class="bg-background text-on-background font-body-default min-h-screen pb-block"
    >
        <!-- TopAppBar from JSON -->
        <header
            class="bg-background dark:bg-background border-b border-outline-variant dark:border-outline-variant flex justify-between items-center w-full px-margin-mobile h-16 docked full-width top-0 sticky z-40 transition-colors duration-200"
        >
            <button
                aria-label="Go back"
                class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low dark:hover:bg-surface-container-low transition-colors duration-200 text-primary dark:text-primary-fixed-dim"
            >
                <span class="material-symbols-outlined" data-icon="chevron_left"
                    >chevron_left</span
                >
            </button>
            <h1
                class="font-headline-md text-headline-md text-on-surface dark:text-on-surface font-title-lg text-title-lg"
            >
                October 2023
            </h1>
            <button
                aria-label="Next"
                class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low dark:hover:bg-surface-container-low transition-colors duration-200 text-primary dark:text-primary-fixed-dim"
            >
                <span
                    class="material-symbols-outlined"
                    data-icon="chevron_right"
                    >chevron_right</span
                >
            </button>
        </header>
        <main class="px-[20px] pt-section max-w-md mx-auto">
            <div class="mb-section">
                <h2
                    class="font-title-lg text-title-lg text-on-background mb-compact"
                >
                    Currency & Rates
                </h2>
                <p class="font-body-small text-body-small text-ink-500">
                    Manage your primary currency and live exchange rates for
                    accurate tracking.
                </p>
            </div>
            <!-- Exchange Rate Status Card (Glassmorphism/Minimalist) -->
            <div
                class="bg-paper-050 rounded-[16px] p-standard mb-block border border-[rgba(30,33,31,0.06)] shadow-sm"
            >
                <div class="flex justify-between items-center mb-standard">
                    <div class="flex items-center gap-compact text-ink-700">
                        <span
                            class="material-symbols-outlined"
                            data-icon="sync"
                            style="
                                font-variation-settings: &quot;wght&quot; 300;
                            "
                            >sync</span
                        >
                        <h3 class="font-body-strong text-body-strong">
                            Exchange Rates
                        </h3>
                    </div>
                    <div class="bg-surface-container rounded-full px-3 py-1">
                        <span class="font-caption text-caption text-primary"
                            >Live</span
                        >
                    </div>
                </div>
                <div class="flex items-end justify-between">
                    <div>
                        <p
                            class="font-footnote text-footnote text-ink-500 mb-1"
                        >
                            Last updated
                        </p>
                        <p
                            class="font-body-default text-body-default text-on-surface"
                            id="last-update-time"
                        >
                            Today, 09:41 AM
                        </p>
                    </div>
                    <button
                        class="bg-primary-container text-on-primary-container font-body-small text-body-small rounded-full px-4 py-2 hover:opacity-80 transition-opacity flex items-center gap-2"
                        id="update-rates-btn"
                    >
                        <span
                            class="material-symbols-outlined text-[18px]"
                            data-icon="refresh"
                            >refresh</span
                        >
                        Update Now
                    </button>
                </div>
            </div>
            <!-- Primary Currency Selection -->
            <div>
                <h3
                    class="font-body-strong text-body-strong text-on-background mb-standard ml-compact"
                >
                    Primary Currency
                </h3>
                <div class="flex flex-col gap-compact">
                    <!-- USD (Active State) -->
                    <button
                        class="currency-option w-full flex items-center justify-between p-standard bg-primary-container text-on-primary-container rounded-[16px] transition-all duration-200 border border-transparent shadow-[0_2px_8px_rgba(41,105,86,0.15)]"
                        data-currency="USD"
                    >
                        <div class="flex items-center gap-standard">
                            <div
                                class="w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm text-on-surface"
                            >
                                🇺🇸
                            </div>
                            <div class="text-left">
                                <p class="font-body-strong text-body-strong">
                                    USD
                                </p>
                                <p
                                    class="font-body-small text-body-small opacity-80"
                                >
                                    US Dollar
                                </p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full bg-surface-bright flex items-center justify-center text-primary"
                        >
                            <span
                                class="material-symbols-outlined text-[16px] fill"
                                data-icon="check_circle"
                                >check_circle</span
                            >
                        </div>
                    </button>
                    <!-- EUR -->
                    <button
                        class="currency-option w-full flex items-center justify-between p-standard bg-paper-050 text-on-surface rounded-[16px] transition-all duration-200 border border-[rgba(30,33,31,0.06)] hover:bg-surface-container-highest"
                        data-currency="EUR"
                    >
                        <div class="flex items-center gap-standard">
                            <div
                                class="w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm border border-[rgba(30,33,31,0.04)]"
                            >
                                🇪🇺
                            </div>
                            <div class="text-left">
                                <p class="font-body-strong text-body-strong">
                                    EUR
                                </p>
                                <p
                                    class="font-body-small text-body-small text-ink-500"
                                >
                                    Euro
                                </p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full border-2 border-outline-variant"
                        ></div>
                    </button>
                    <!-- GBP -->
                    <button
                        class="currency-option w-full flex items-center justify-between p-standard bg-paper-050 text-on-surface rounded-[16px] transition-all duration-200 border border-[rgba(30,33,31,0.06)] hover:bg-surface-container-highest"
                        data-currency="GBP"
                    >
                        <div class="flex items-center gap-standard">
                            <div
                                class="w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm border border-[rgba(30,33,31,0.04)]"
                            >
                                🇬🇧
                            </div>
                            <div class="text-left">
                                <p class="font-body-strong text-body-strong">
                                    GBP
                                </p>
                                <p
                                    class="font-body-small text-body-small text-ink-500"
                                >
                                    British Pound
                                </p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full border-2 border-outline-variant"
                        ></div>
                    </button>
                    <!-- JPY -->
                    <button
                        class="currency-option w-full flex items-center justify-between p-standard bg-paper-050 text-on-surface rounded-[16px] transition-all duration-200 border border-[rgba(30,33,31,0.06)] hover:bg-surface-container-highest"
                        data-currency="JPY"
                    >
                        <div class="flex items-center gap-standard">
                            <div
                                class="w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm border border-[rgba(30,33,31,0.04)]"
                            >
                                🇯🇵
                            </div>
                            <div class="text-left">
                                <p class="font-body-strong text-body-strong">
                                    JPY
                                </p>
                                <p
                                    class="font-body-small text-body-small text-ink-500"
                                >
                                    Japanese Yen
                                </p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full border-2 border-outline-variant"
                        ></div>
                    </button>
                    <!-- CNY -->
                    <button
                        class="currency-option w-full flex items-center justify-between p-standard bg-paper-050 text-on-surface rounded-[16px] transition-all duration-200 border border-[rgba(30,33,31,0.06)] hover:bg-surface-container-highest"
                        data-currency="CNY"
                    >
                        <div class="flex items-center gap-standard">
                            <div
                                class="w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm border border-[rgba(30,33,31,0.04)]"
                            >
                                🇨🇳
                            </div>
                            <div class="text-left">
                                <p class="font-body-strong text-body-strong">
                                    CNY
                                </p>
                                <p
                                    class="font-body-small text-body-small text-ink-500"
                                >
                                    Chinese Yuan
                                </p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full border-2 border-outline-variant"
                        ></div>
                    </button>
                </div>
            </div>
        </main>
        <script>
            // Micro-interaction for update button
            const updateBtn = document.getElementById("update-rates-btn");
            const updateTime = document.getElementById("last-update-time");

            updateBtn.addEventListener("click", () => {
                const icon = updateBtn.querySelector("span");
                icon.classList.add("animate-spin");
                updateBtn.classList.add("opacity-70");

                setTimeout(() => {
                    icon.classList.remove("animate-spin");
                    updateBtn.classList.remove("opacity-70");
                    const now = new Date();
                    let hours = now.getHours();
                    const minutes = now
                        .getMinutes()
                        .toString()
                        .padStart(2, "0");
                    const ampm = hours >= 12 ? "PM" : "AM";
                    hours = hours % 12;
                    hours = hours ? hours : 12;
                    updateTime.textContent = `Today, ${hours}:${minutes} ${ampm}`;
                }, 800);
            });

            // Toggle selection logic
            const options = document.querySelectorAll(".currency-option");

            options.forEach((option) => {
                option.addEventListener("click", () => {
                    // Reset all
                    options.forEach((opt) => {
                        opt.className =
                            "currency-option w-full flex items-center justify-between p-standard bg-paper-050 text-on-surface rounded-[16px] transition-all duration-200 border border-[rgba(30,33,31,0.06)] hover:bg-surface-container-highest";
                        opt.querySelector(".text-left p:last-child").className =
                            "font-body-small text-body-small text-ink-500";
                        const rightIcon = opt.querySelector("div:last-child");
                        rightIcon.className =
                            "w-6 h-6 rounded-full border-2 border-outline-variant";
                        rightIcon.innerHTML = "";

                        const emojiContainer = opt.querySelector("div.w-12");
                        emojiContainer.className =
                            "w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm border border-[rgba(30,33,31,0.04)]";
                    });

                    // Set active
                    option.className =
                        "currency-option w-full flex items-center justify-between p-standard bg-primary-container text-on-primary-container rounded-[16px] transition-all duration-200 border border-transparent shadow-[0_2px_8px_rgba(41,105,86,0.15)]";
                    option.querySelector(".text-left p:last-child").className =
                        "font-body-small text-body-small opacity-80";

                    const emojiContainer = option.querySelector("div.w-12");
                    emojiContainer.className =
                        "w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center text-[20px] shadow-sm text-on-surface";

                    const rightIcon = option.querySelector("div:last-child");
                    rightIcon.className =
                        "w-6 h-6 rounded-full bg-surface-bright flex items-center justify-center text-primary";
                    rightIcon.innerHTML =
                        '<span class="material-symbols-outlined text-[16px] fill" data-icon="check_circle">check_circle</span>';
                });
            });
        </script>
    </body>
</html>
