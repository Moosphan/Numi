        <script>
            // Simple script to demonstrate keypad interaction (visual only)
            document.querySelectorAll(".grid-cols-3 button").forEach((btn) => {
                btn.addEventListener("click", function () {
                    const val = this.innerText.trim();
                    const display = document.getElementById("amount-display");
                    if (val === "backspace") return; // Icon text might bleed, simplistic handling

                    let current = display.innerText;
                    if (current === "0.00" && val !== ".") {
                        if (
                            val !== "backspace" &&
                            val !== "notes" &&
                            val !== "check"
                        ) {
                            display.innerText = val;
                        }
                    } else if (
                        val !== "backspace" &&
                        val !== "notes" &&
                        val !== "check"
                    ) {
                        if (current.length < 8) {
                            // basic limit
                            display.innerText = current + val;
                        }
                    }
                });
            });
